# fly.toml
app = "the-gilded-fork"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = "gilded_fork_db"
  destination = "/app/db"
